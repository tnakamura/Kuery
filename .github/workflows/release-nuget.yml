name: Release NuGet Package

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine package version from release tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Pack
        run: dotnet pack /home/runner/work/Kuery/Kuery/src/Kuery/Kuery.csproj --configuration Release --no-build --output /home/runner/work/Kuery/Kuery/artifacts /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Push packages to NuGet.org
        run: dotnet nuget push "/home/runner/work/Kuery/Kuery/artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
